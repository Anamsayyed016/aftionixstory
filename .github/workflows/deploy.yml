name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy StoryVerse to Hostinger VPS
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Zero-downtime deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 35m
          script: |
            set -euo pipefail
            cd /var/www/storyverse-ai

            if [ ! -f .env ]; then
              echo "ERROR: /var/www/storyverse-ai/.env is missing."
              exit 1
            fi

            echo "==> Fetching latest main from GitHub"
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            chmod +x scripts/deploy-zero-downtime.sh
            ./scripts/deploy-zero-downtime.sh
