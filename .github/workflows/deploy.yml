name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy StoryVerse to Hostinger VPS
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 25m
          script: |
            set -euo pipefail
            cd /var/www/storyverse-ai

            if [ ! -f .env ]; then
              echo "ERROR: /var/www/storyverse-ai/.env is missing."
              echo "Create it on the VPS before deploying (AUTH_SECRET, AUTH_URL, DATABASE_URL, POSTGRES_PASSWORD)."
              exit 1
            fi

            echo "==> Fetching latest main from GitHub"
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            echo "==> Stopping previous app containers"
            docker compose down || true

            echo "==> Rebuilding and restarting Docker stack"
            docker compose up -d --build

            echo "==> Waiting for Postgres"
            for i in $(seq 1 30); do
              if docker compose exec -T db pg_isready -U storyverse >/dev/null 2>&1; then
                break
              fi
              sleep 2
            done

            echo "==> Applying Prisma migrations"
            set -a
            # shellcheck disable=SC1091
            . ./.env
            set +a
            docker run --rm \
              --network storyverse-ai_default \
              -v /var/www/storyverse-ai/prisma:/prisma \
              -e DATABASE_URL \
              node:22-alpine \
              sh -c "npm install --no-save prisma@6.19.3 >/dev/null && npx prisma migrate deploy --schema=/prisma/schema.prisma"

            echo "==> Health check"
            sleep 3
            curl -fsS -o /dev/null -w "HTTP %{http_code}\n" http://127.0.0.1:3000/ || {
              echo "App did not respond on 127.0.0.1:3000"
              docker compose ps
              docker compose logs --tail=80
              exit 1
            }

            echo "==> Deploy complete: $(git rev-parse --short HEAD)"
