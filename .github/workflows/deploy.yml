name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy StoryVerse to Hostinger VPS
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script_stop: true
          command_timeout: 25m
          script: |
            set -euo pipefail
            cd /var/www/storyverse-ai

            echo "==> Fetching latest main from GitHub"
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            echo "==> Rebuilding and restarting Docker app"
            docker compose up -d --build

            echo "==> Health check"
            sleep 3
            curl -fsS -o /dev/null -w "HTTP %{http_code}\n" http://127.0.0.1:3000/ || {
              echo "App did not respond on 127.0.0.1:3000"
              docker compose ps
              docker compose logs --tail=80
              exit 1
            }

            echo "==> Deploy complete: $(git rev-parse --short HEAD)"
