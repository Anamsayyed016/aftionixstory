services:
  db:
    image: postgres:16-alpine
    container_name: storyverse-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-storyverse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-storyverse}
    volumes:
      - storyverse_pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-storyverse} -d ${POSTGRES_DB:-storyverse}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  # Blue/green app slots for zero-downtime standalone deploys.
  # Only one should receive Nginx traffic at a time.
  web_blue:
    build:
      context: .
      args:
        STORYVERSE_BUILD_ID: ${STORYVERSE_BUILD_ID:-unknown}
        STORYVERSE_BUILT_AT: ${STORYVERSE_BUILT_AT:-}
    image: storyverse-ai-web:latest
    container_name: storyverse-ai-blue
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      AUTH_TRUST_HOST: "true"
      STORYVERSE_BUILD_ID: ${STORYVERSE_BUILD_ID:-unknown}
      STORYVERSE_BUILT_AT: ${STORYVERSE_BUILT_AT:-}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(async r=>{const j=await r.json();process.exit(r.ok&&j.ok?0:1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  web_green:
    build:
      context: .
      args:
        STORYVERSE_BUILD_ID: ${STORYVERSE_BUILD_ID:-unknown}
        STORYVERSE_BUILT_AT: ${STORYVERSE_BUILT_AT:-}
    image: storyverse-ai-web:latest
    container_name: storyverse-ai-green
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:3001:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      AUTH_TRUST_HOST: "true"
      STORYVERSE_BUILD_ID: ${STORYVERSE_BUILD_ID:-unknown}
      STORYVERSE_BUILT_AT: ${STORYVERSE_BUILT_AT:-}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(async r=>{const j=await r.json();process.exit(r.ok&&j.ok?0:1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

volumes:
  storyverse_pgdata:
